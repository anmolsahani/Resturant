<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Delicious Bites</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f4f4f4;
}

header {
  background: url('https://images.unsplash.com/photo-1555992336-03a23c7b20ee') center/cover;
  color: white;
  text-align: center;
  padding: 80px 20px;
}

header h1 {
  font-size: 3em;
  margin: 0;
}

.container {
  width: 90%;
  margin: auto;
}

.menu-section {
  margin: 40px 0;
}

.menu-section h2 {
  border-left: 5px solid #ff6b6b;
  padding-left: 10px;
}

.menu-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
  gap: 20px;
}

.card {
  background: white;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 4px 8px rgba(0,0,0,0.1);
  transition: 0.3s;
}

.card:hover {
  transform: scale(1.03);
}

.card img {
  width: 100%;
  height: 180px;
  object-fit: cover;
}

.card-content {
  padding: 15px;
}

.price {
  color: #ff6b6b;
  font-weight: bold;
}

button {
  background: #ff6b6b;
  color: white;
  border: none;
  padding: 10px;
  width: 100%;
  border-radius: 5px;
  cursor: pointer;
}

button:hover {
  background: #e55a5a;
}

/* Booking form */
.booking {
  background: white;
  padding: 20px;
  border-radius: 10px;
  margin: 40px 0;
}

.booking input, .booking select {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
}

footer {
  text-align: center;
  padding: 20px;
  background: #333;
  color: white;
}

/* Responsive */
@media(max-width:600px) {
  header h1 {
    font-size: 2em;
  }
}
</style>
</head>

<body>

<header>
  <h1>Delicious Bites</h1>
  <p>Fresh • Tasty • Fast</p>
</header>

<div class="container">

  <!-- Starters -->
  <div class="menu-section">
    <h2>Starters</h2>
    <div class="menu-grid">

      <div class="card">
        <img src="https://images.unsplash.com/photo-1604908176997-125f25cc6f3d">
        <div class="card-content">
          <h3>Spring Rolls</h3>
          <p class="price">₹120</p>
          <button onclick="order('Spring Rolls')">Order Now</button>
        </div>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1600891964599-f61ba0e24092">
        <div class="card-content">
          <h3>Garlic Bread</h3>
          <p class="price">₹100</p>
          <button onclick="order('Garlic Bread')">Order Now</button>
        </div>
      </div>

    </div>
  </div>

  <!-- Main Course -->
  <div class="menu-section">
    <h2>Main Course</h2>
    <div class="menu-grid">

      <div class="card">
        <img src="https://images.unsplash.com/photo-1601050690597-df0568f70950">
        <div class="card-content">
          <h3>Paneer Butter Masala</h3>
          <p class="price">₹250</p>
          <button onclick="order('Paneer Butter Masala')">Order Now</button>
        </div>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1604908811838-01a0c2d3a2c4">
        <div class="card-content">
          <h3>Chicken Biryani</h3>
          <p class="price">₹300</p>
          <button onclick="order('Chicken Biryani')">Order Now</button>
        </div>
      </div>

    </div>
  </div>

  <!-- Desserts -->
  <div class="menu-section">
    <h2>Desserts</h2>
    <div class="menu-grid">

      <div class="card">
        <img src="https://images.unsplash.com/photo-1605475128023-6e9c52a4da41">
        <div class="card-content">
          <h3>Gulab Jamun</h3>
          <p class="price">₹80</p>
          <button onclick="order('Gulab Jamun')">Order Now</button>
        </div>
      </div>

      <div class="card">
        <img src="https://images.unsplash.com/photo-1599785209707-28d0a9f4d4d5">
        <div class="card-content">
          <h3>Ice Cream</h3>
          <p class="price">₹90</p>
          <button onclick="order('Ice Cream')">Order Now</button>
        </div>
      </div>

    </div>
  </div>

  <!-- Booking Form -->
  <div class="booking">
    <h2>Book a Table</h2>
    <form onsubmit="bookTable(event)">
      <input type="text" placeholder="Your Name" required>
      <input type="email" placeholder="Email" required>
      <input type="date" required>
      <input type="time" required>
      <select required>
        <option value="">Guests</option>
        <option>1-2</option>
        <option>3-5</option>
        <option>6+</option>
      </select>
      <button type="submit">Book Now</button>
    </form>
  </div>

</div>

<footer>
  <p>© 2026 Delicious Bites</p>
</footer>

<script>
function order(item) {
  alert("You ordered: " + item);
}

function bookTable(event) {
  event.preventDefault();
  alert("Table booked successfully!");
}
</script>

</body>
</html>
